<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox 倉鼠大冒險 V3.5 - 3D萌寵與漸層發光版！</title>
    <style>
        /* --- 基礎版面與配色 --- */
        :root {
            --primary-color: #3b82f6; 
            --success-color: #22c55e; 
            --warning-color: #f59e0b; 
            --danger-color: #ef4444;
            --bg-color: #f0f4f8;
            --text-color: #1e293b;
            --code-bg: #1e1e1e;
        }

        /* 遊戲主容器 */
        .container {
            width: 100%;
            max-width: 1100px;
            background: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-top: 20px;
            box-sizing: border-box;
            color: var(--text-color);
        }

        /* [修改] 遊戲內標題：加大、加粗、套用華麗金橘漸層與發光特效 */
        h1.gradient-title {
            text-align: center;
            font-size: 3.5em; /* 加大標題 */
            font-weight: 800; /* 加粗字體 */
            margin-top: 0;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #fbbf24, #d97706); /* 金橘彩色漸層 */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
            filter: drop-shadow(0 4px 12px rgba(217, 119, 6, 0.35)); /* 霓虹發光 */
        }
        
        /* --- 關卡導覽 --- */
        .level-nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
        }
        .level-btn {
            padding: 10px 18px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            transition: all 0.2s ease;
            font-size: 0.95em;
        }
        .level-btn.active {
            background-color: #d97706;
            color: white;
            border-color: #d97706;
            box-shadow: 0 4px 10px rgba(217, 119, 6, 0.3);
        }
        .level-btn.completed {
            border-color: var(--success-color);
            color: var(--success-color);
        }

        /* --- 遊戲主區塊 --- */
        .game-area {
            display: flex;
            gap: 30px;
        }
        @media (max-width: 850px) {
            .game-area { flex-direction: column; }
        }
        
        /* 左側控制面板 */
        .control-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 320px;
        }
        .instruction-box {
            background: #fffbeb; 
            padding: 18px;
            border-left: 6px solid #d97706;
            border-radius: 8px;
        }
        .instruction-box h3 { margin: 0 0 10px 0; color: #d97706; }
        .instruction-box p { margin: 0; line-height: 1.6; font-size: 1.05em;}

        .hint-box {
            background: #fffbeb;
            padding: 15px;
            border-left: 6px solid var(--warning-color);
            border-radius: 8px;
            color: #92400e;
            display: none;
            font-size: 0.95em;
            line-height: 1.5;
        }
        
        /* CSS 輸入區域 */
        .code-container {
            background: var(--code-bg);
            color: #d4d4d4;
            padding: 18px;
            border-radius: 10px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 15px;
        }
        .code-prefix { color: #569cd6; }
        textarea {
            width: 100%;
            height: 120px;
            background: #2d2d2d;
            color: #ce9178;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px;
            font-family: inherit;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            margin: 10px 0;
            outline: none;
        }

        /* 按鈕群組 */
        .btn-group {
            display: flex;
            gap: 15px;
        }
        button.action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease, transform 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        button.action-btn:active { transform: scale(0.98); }

        .hint-btn { background: #d97706; color: white; }
        .check-btn { background: var(--success-color); color: white; }
        .check-btn.error { background-color: var(--danger-color); animation: shake 0.4s; }
        .check-btn.success-glow { background: linear-gradient(45deg, #f59e0b, #fbbf24); }

        /* 右側畫布預覽區 */
        .visual-panel {
            flex: 1;
            background: #fef6e4; 
            border: 4px dashed #f59e0b;
            border-radius: 12px;
            min-height: 400px;
            display: flex;
            position: relative;
        }
        #flex-container { width: 100%; height: 100%; box-sizing: border-box; padding: 15px; display: flex; }

        /* --- 🐹 [修改] 清晰萌萌倉鼠樣式核心區 --- */
        .card {
            width: 95px; 
            height: 95px; 
            margin: 8px; 
            color: white; 
            font-weight: 800; 
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%; /* 圓滾滾的身軀 */
            position: relative;
            box-shadow: 0 6px 12px rgba(217,119,6,0.2);
            border: 3px solid #fff;
            overflow: hidden; /* 確保頭像不超出邊框 */
            transition: all 0.3s ease;
        }
        /* [修改] 使用清晰的 3D 卡通倉鼠頭像 */
        .card .avatar {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }
        /* 倉鼠編號角標 */
        .card .number {
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 13px;
            background: rgba(0,0,0,0.4);
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        /* 倉鼠漸層披風毛色與頭像（使用假路徑，建議您替換為實際圖片或更精美的emoji） */
        .card-1 { background: linear-gradient(135deg, #ff8787, #e03131); }
        .card-2 { background: linear-gradient(135deg, #74c0fc, #1971c2); }
        .card-3 { background: linear-gradient(135deg, #da77f2, #9c36b5); }
        .card-4 { background: linear-gradient(135deg, #ffd43b, #f59f00); }
        .card-5 { background: linear-gradient(135deg, #63e6be, #0ca678); }

        /* --- 錯誤按鈕抖動 --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* --- 單關彩色小紙花 --- */
        .confetti {
            position: absolute; width: 10px; height: 10px; border-radius: 50%;
            animation: confettiFall 1.5s ease-out forwards; opacity: 0; z-index: 10;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(150px) scale(0.5); opacity: 0; }
        }

        /* --- ✨ 🚀 [修改] 杜絕開始動畫右側 Bar --- */
        .welcome-view {
            width: 100vw;
            height: 100vh;
            background-color: #0b0f19; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fbbf24;
            text-align: center;
            position: fixed; 
            top: 0; left: 0;
            z-index: 10000; 
            overflow: hidden; /* [核心修改] 杜絕開場畫面右側 Bar */
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        .welcome-view.fade-out { opacity: 0; visibility: hidden; }
        .welcome-view p { color: #ffffff; font-size: 1.5em; margin-bottom: 40px; }
        .start-adventure-btn {
            padding: 18px 45px; background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: white; border: none; border-radius: 30px; font-size: 22px; font-weight: bold;
            cursor: pointer; box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
            transition: all 0.2s;
        }
        .start-adventure-btn:hover { background-color: #d97706; transform: translateY(-2px); }

        /* --- 🎉 杜絕結束動畫右側 Bar --- */
        .ending-view {
            width: 100vw;
            height: 100vh;
            background-color: #0b0f19; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fbbf24;
            text-align: center;
            position: fixed; 
            top: 0; left: 0;
            z-index: 9999;
            overflow: hidden; /* [核心修改] 杜絕結束畫面右側 Bar */
        }
        .ending-view h2 { font-size: 3.5em; margin: 0; text-shadow: 0 0 20px #f59e0b; animation: bounceIn 1s ease; }
        .ending-view p { font-size: 1.5em; color: white; margin: 15px 0 30px 0; }
        .replay-btn {
            padding: 15px 30px; background: var(--success-color); color: white;
            border: none; border-radius: 30px; font-size: 18px; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 煙火粒子 */
        .firework {
            position: absolute; width: 5px; height: 5px; border-radius: 50%;
            animation: fireworkSpread 2s ease-out forwards;
        }
        @keyframes fireworkSpread {
            0% { transform: translate(0, 0); opacity: 1; }
            100% { transform: translate(var(--fx-x), var(--fx-y)); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="welcome-view" id="welcomeStage">
    <h1 class="gradient-title">Flexbox 倉鼠大冒險！</h1>
    <p>用排版魔法，幫萌寵找到完美的家</p>
    <button class="start-adventure-btn" onclick="startAdventure()">開始冒險 🚀</button>
</div>

<div class="container" id="mainGameContainer">
    <h1 class="gradient-title">Flexbox 倉鼠大冒險！</h1>
    <div class="level-nav" id="levelNav"></div>

    <div class="game-area">
        <div class="control-panel">
            <div class="instruction-box">
                <h3><span id="levelTitle"></span>: 任務目標</h3>
                <p id="targetDescription">載入中...</p>
            </div>
            
            <div class="hint-box" id="hintBox"></div>

            <div class="code-container">
                <span class="code-prefix">#hamster-cage {</span>
                <textarea id="cssInput" placeholder="/* 在這裡輸入你的 Flexbox 屬性 */&#10;例如：justify-content: center;"></textarea>
                <span class="code-prefix">}</span>
            </div>

            <div class="btn-group">
                <button class="action-btn hint-btn" onclick="toggleHint()"><span>💡</span> 快速提示</button>
                <button class="action-btn check-btn" id="checkBtn" onclick="checkAnswer()">
                    <span id="checkIcon">✅</span> <span id="checkText">檢查答案</span>
                </button>
            </div>
        </div>

        <div class="visual-panel">
            <div id="flex-container"></div>
        </div>
    </div>
</div>

<script>
    // --- 關卡資料庫 ---
    const levels = [
        {
            title: "第一關",
            description: "預設的區塊元素是上下排列的。請使用屬性讓這三張卡片「橫向一排」吧！",
            hint: "設定主軸「橫向排列」→ flex-direction: row;",
            cardsCount: 3,
            initStyles: { flexDirection: "column" }, // 故意先直排讓學生切換
            validate: (computedStyle) => computedStyle.flexDirection === "row"
        },
        {
            title: "第二關",
            description: "太棒了！接下來請讓這三張橫排的卡片，在畫布中「水平置中」對對。.",
            hint: "設定主軸「水平置中」→ justify-content: center;",
            cardsCount: 3,
            validate: (computedStyle) => computedStyle.justifyContent === "center"
        },
        {
            title: "第三關",
            description: "現在卡片已經水平置中了，請再加把勁，讓卡片也「垂直置中」吧！",
            hint: "設定交錯軸「垂直置中」→ align-items: center;",
            cardsCount: 3,
            validate: (computedStyle) => computedStyle.alignItems === "center"
        },
        {
            title: "第四關",
            description: "轉個彎吧！請將主軸方向改成「直向排列」，讓卡片轉為垂直由上往下排。",
            hint: "設定主軸「直向排列」→ flex-direction: column;",
            cardsCount: 3,
            validate: (computedStyle) => computedStyle.flexDirection === "column"
        },
        {
            title: "第五關",
            description: "大魔王來了！這裡有 5 張卡片，寬度已經超出容器了。請設定讓卡片在空間不足時「自動換行」。",
            hint: "設定「自動換行」→ flex-wrap: wrap;",
            cardsCount: 5,
            validate: (computedStyle) => computedStyle.flexWrap === "wrap"
        }
    ];

    let currentLevelIndex = 0;
    const completedLevels = new Set(); // 記錄完成的關卡

    // --- 初始化 ---
    function initGame() {
        renderNav();
        loadLevel(currentLevelIndex);
    }

    // 🚀 開始冒險
    function startAdventure() {
        const stage = document.getElementById("welcomeStage");
        stage.classList.add("fade-out"); // 加上 CSS 淡出特效
        setTimeout(() => {
            stage.style.display = "none";
        }, 600); // 動畫演完後隱藏
    }

    function renderNav() {
        const nav = document.getElementById("levelNav");
        nav.innerHTML = "";
        levels.forEach((lvl, index) => {
            const btn = document.createElement("button");
            let className = 'level-btn';
            if (index === currentLevelIndex) className += ' active';
            if (completedLevels.has(index)) className += ' completed';
            
            btn.className = className;
            btn.innerText = lvl.title;
            btn.onclick = () => switchLevel(index);
            nav.appendChild(btn);
        });
    }

    function loadLevel(index) {
        currentLevelIndex = index;
        const level = levels[index];
        
        renderNav();
        
        document.getElementById("levelTitle").innerText = level.title;
        document.getElementById("targetDescription").innerText = level.description;
        const hintBox = document.getElementById("hintBox");
        hintBox.innerText = level.hint;
        hintBox.style.display = "none";
        
        document.getElementById("cssInput").value = "";
        resetCheckBtn();
        
        const container = document.getElementById("flex-container");
        container.removeAttribute("style");
        container.style.display = "flex"; // 強制維持 flex
        
        if (level.initStyles) {
            Object.assign(container.style, level.initStyles);
        }

        // 產生卡片
        container.innerHTML = "";
        for (let i = 1; i <= level.cardsCount; i++) {
            const card = document.createElement("div");
            card.className = `card card-${i}`;
            // 將 emoji 倉鼠替換為純文字編號，外層 card 樣式會呈現毛色
            card.innerHTML = `<div class="number">No.${i}</div>`;
            container.appendChild(card);
        }
    }

    function switchLevel(index) {
        loadLevel(index);
    }

    function toggleHint() {
        const hintBox = document.getElementById("hintBox");
        hintBox.style.display = hintBox.style.display === "none" ? "block" : "none";
        resetCheckBtn();
    }

    function resetCheckBtn() {
        const btn = document.getElementById("checkBtn");
        btn.className = "action-btn check-btn";
        document.getElementById("checkIcon").innerText = "✅";
        document.getElementById("checkText").innerText = "檢查答案";
    }

    // --- 核心驗證與特效邏輯 ---
    function checkAnswer() {
        const inputCode = document.getElementById("cssInput").value;
        const container = document.getElementById("flex-container");
        const btn = document.getElementById("checkBtn");
        const icon = document.getElementById("checkIcon");
        const text = document.getElementById("checkText");
        
        try {
            // 套用學生輸入的代碼
            container.style.cssText = "display: flex;" + inputCode;
            
            // 取得實際樣式
            const computedStyle = window.getComputedStyle(container);
            const currentLevel = levels[currentLevelIndex];
            
            if (currentLevel.validate(computedStyle)) {
                // 🎉 成功破關
                completedLevels.add(currentLevelIndex);
                renderNav();
                
                // 按鈕變金色 + 煙火 confetti
                btn.className = "action-btn check-btn success-glow";
                icon.innerText = "🏆";
                text.innerText = "成功破關！";

                createConfettiEffect();

                // 延遲後進入下一關或結局
                setTimeout(() => {
                    if (currentLevelIndex < levels.length - 1) {
                        loadLevel(currentLevelIndex + 1); // 自動跳下一關
                    } else {
                        triggerCleanEndingView(); // 通關結局
                    }
                }, 1500); 

            } else {
                // ❌ 畫面不對
                btn.className = "action-btn check-btn error";
                icon.innerText = "❌";
                text.innerText = "畫面不對喔";
                setTimeout(resetCheckBtn, 1000);
            }
        } catch (e) {
            // ⚠️ 語法錯誤
            btn.className = "action-btn check-btn error";
            icon.innerText = "⚠️";
            text.innerText = "語法錯誤";
            setTimeout(resetCheckBtn, 1000);
        }
    }

    function createConfettiEffect() {
        const panel = document.querySelector('.visual-panel');
        const colors = ['#f59e0b', '#fbbf24', '#fff'];
        for (let i = 0; i < 30; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = Math.random() * 90 + '%';
            confetti.style.top = Math.random() * 50 + '%';
            panel.appendChild(confetti);
            setTimeout(() => confetti.remove(), 1500);
        }
    }

    // 🎉 獨立滿版「恭喜畢業啦！」畫面
    function triggerCleanEndingView() {
        // 1. 直接隱藏原本裝載遊戲的整個主頁面容器，徹底清除原有的 DOM 佈局
        document.getElementById("mainGameContainer").style.display = "none";
        
        // 2. 動態在 <body> 最底層建立一個全新的獨立全螢幕區塊
        const endingDiv = document.createElement("div");
        endingDiv.className = "ending-view";
        endingDiv.id = "cleanEndingView";
        endingDiv.innerHTML = `
            <h2>🏆 恭喜畢業啦！</h2>
            <p>你已經完美掌握了核心 Flexbox 語法！</p>
            <button class="replay-btn" onclick="completelyResetGame()">再玩一次 🔄</button>
        `;
        document.body.appendChild(endingDiv);

        // 3. 在這個完全乾淨、無捲軸的畫布中開心地連續發射大煙火
        for (let i = 0; i < 15; i++) {
            setTimeout(createFirework, i * 200);
        }
    }

    function createFirework() {
        const overlay = document.getElementById("cleanEndingView");
        const colors = ['#f59e0b', '#fbbf24', '#fff'];
        
        // 在新畫面的視窗內隨機產生爆裂中心點
        const centerX = (Math.random() * 80 + 10) + '%';
        const centerY = (Math.random() * 60 + 20) + '%';
        
        // 粒子朝外飛散
        for (let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.className = 'firework';
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            particle.style.left = centerX;
            particle.style.top = centerY;
            
            // 隨機爆裂方向與距離 (CSS 變數)
            particle.style.setProperty('--fx-x', (Math.random() - 0.5) * 400 + 'px');
            particle.style.setProperty('--fx-y', (Math.random() - 0.5) * 300 + 'px');
            
            particle.style.animationDuration = Math.random() * 1 + 1 + 's';
            
            overlay.appendChild(particle);
            setTimeout(() => particle.remove(), 2000);
        }
    }

    function completelyResetGame() {
        // 移除獨立結局畫面
        const endingView = document.getElementById("cleanEndingView");
        if (endingView) {
            endingView.remove();
        }
        
        // 重新顯示主遊戲，並初始化
        document.getElementById("mainGameContainer").style.display = "block";
        completedLevels.clear();
        loadLevel(0);
    }

    window.onload = initGame;
</script>

</body>
</html>
