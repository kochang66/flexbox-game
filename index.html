<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox 5關大闖關 V2.4 - Bug修復完美版！</title>
    <style>
        /* --- 基礎版面與配色 --- */
        :root {
            --primary-color: #3b82f6; 
            --success-color: #22c55e; 
            --warning-color: #f59e0b; 
            --danger-color: #ef4444;
            --bg-color: #f0f4f8;
            --text-color: #1e293b;
            --code-bg: #1e1e1e;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-top: 20px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 2.2em;
        }
        
        .level-nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
        }
        .level-btn {
            padding: 10px 18px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            transition: all 0.2s ease;
            font-size: 0.95em;
        }
        .level-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }
        .level-btn.completed {
            border-color: var(--success-color);
            color: var(--success-color);
        }

        .game-area {
            display: flex;
            gap: 30px;
        }
        @media (max-width: 850px) {
            .game-area { flex-direction: column; }
        }
        
        .control-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 320px;
        }
        .instruction-box {
            background: #eff6ff;
            padding: 18px;
            border-left: 6px solid var(--primary-color);
            border-radius: 8px;
        }
        .instruction-box h3 { margin: 0 0 10px 0; color: var(--primary-color); }
        .instruction-box p { margin: 0; line-height: 1.6; font-size: 1.05em;}

        .hint-box {
            background: #fffbeb;
            padding: 15px;
            border-left: 6px solid var(--warning-color);
            border-radius: 8px;
            color: #92400e;
            display: none;
            font-size: 0.95em;
            line-height: 1.5;
        }
        
        .code-container {
            background: var(--code-bg);
            color: #d4d4d4;
            padding: 18px;
            border-radius: 10px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 15px;
        }
        .code-prefix { color: #569cd6; }
        textarea {
            width: 100%;
            height: 120px;
            background: #2d2d2d;
            color: #ce9178;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px;
            font-family: inherit;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            margin: 10px 0;
            outline: none;
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }
        button.action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease, transform 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        button.action-btn:active { transform: scale(0.98); }

        .hint-btn { background: var(--primary-color); color: white; }
        .check-btn { background: var(--success-color); color: white; }
        .check-btn.error { background-color: var(--danger-color); animation: shake 0.4s; }
        .check-btn.success-glow { background: linear-gradient(45deg, #f59e0b, #fbbf24); }

        .visual-panel {
            flex: 1;
            background: #f8fafc;
            border: 4px dashed #cbd5e1;
            border-radius: 12px;
            min-height: 400px;
            display: flex;
            position: relative;
        }
        #flex-container { width: 100%; height: 100%; box-sizing: border-box; padding: 15px; display: flex; }

        .card {
            width: 90px; height: 90px; margin: 8px; color: white; font-weight: 800; font-size: 32px;
            display: flex; justify-content: center; align-items: center; border-radius: 12px;
            position: relative; box-shadow: 0 6px 12px rgba(0,0,0,0.15); transition: all 0.3s ease;
        }
        .card::after { content: ''; position: absolute; top: 5px; left: 5px; right: 5px; bottom: 5px; border: 2px solid rgba(255,255,255,0.2); border-radius: 8px; }
        .card-1 { background: linear-gradient(135deg, #ef4444, #b91c1c); }
        .card-2 { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .card-3 { background: linear-gradient(135deg, #a855f7, #7e22ce); }
        .card-4 { background: linear-gradient(135deg, #f97316, #c2410c); }
        .card-5 { background: linear-gradient(135deg, #14b8a6, #0f766e); }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .confetti {
            position: absolute; width: 10px; height: 10px; border-radius: 50%;
            animation: confettiFall 1.5s ease-out forwards; opacity: 0; z-index: 10;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(150px) scale(0.5); opacity: 0; }
        }

        .ending-view {
            width: 100vw;
            height: 100vh;
            background-color: #0b0f19; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fbbf24;
            text-align: center;
            position: fixed; 
            top: 0; left: 0;
            z-index: 9999;
            overflow: hidden; 
        }
        .ending-view h2 { font-size: 3.8em; margin: 0; text-shadow: 0 0 25px rgba(245,158,11,0.7); animation: bounceIn 1s ease; }
        .ending-view p { font-size: 1.6em; color: #ffffff; margin: 20px 0 40px 0; opacity: 0.9; }
        .restart-btn {
            padding: 16px 36px; background: var(--success-color); color: white;
            border: none; border-radius: 30px; font-size: 20px; font-weight: bold;
            cursor: pointer; box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
            transition: all 0.2s;
        }
        .restart-btn:hover { background-color: #16a34a; transform: translateY(-2px); }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .ending-firework {
            position: absolute; width: 6px; height: 6px; border-radius: 50%;
            animation: fireworkSpread 1.8s ease-out forwards;
        }
        @keyframes fireworkSpread {
            0% { transform: translate(0, 0); opacity: 1; }
            100% { transform: translate(var(--fx-x), var(--fx-y)); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container" id="mainGameContainer">
    <h1>Flexbox 5關大闖關 V2.4</h1>
    <div class="level-nav" id="levelNav"></div>

    <div class="game-area">
        <div class="control-panel">
            <div class="instruction-box">
                <h3><span id="levelTitle"></span>: 任務目標</h3>
                <p id="targetDescription">載入中...</p>
            </div>
            
            <div class="hint-box" id="hintBox"></div>

            <div class="code-container">
                <span class="code-prefix">#flex-container {</span>
                <textarea id="cssInput" placeholder="/* 在這裡輸入你的 Flexbox 屬性 */&#10;例如：justify-content: center;"></textarea>
                <span class="code-prefix">}</span>
            </div>

            <div class="btn-group">
                <button class="action-btn hint-btn" onclick="toggleHint()"><span>💡</span> 快速提示</button>
                <button class="action-btn check-btn" id="checkBtn" onclick="checkAnswer()">
                    <span id="checkIcon">✅</span> <span id="checkText">檢查答案</span>
                </button>
            </div>
        </div>

        <div class="visual-panel">
            <div id="flex-container"></div>
        </div>
    </div>
</div>

<script>
    const levels = [
        {
            title: "第一關",
            description: "預設的區塊元素是上下排列的。請使用屬性讓這三張卡片「橫向一排」吧！",
            hint: "設定主軸方向：flex-direction: row; (註：Flex 預設即為 row，可以直接點檢查看看過關條件喔)",
            cardsCount: 3,
            initStyles: { flexDirection: "column" }, 
            validate: (computedStyle) => computedStyle.flexDirection === "row"
        },
        {
            title: "第二關",
            description: "太棒了！接下來請讓這三張橫排的卡片，在畫布中「水平置中」對齊。",
            hint: "控制「主軸對齊」的屬性是 justify-content。既然要置中，請試試看把值設定為關鍵字「center」吧！",
            cardsCount: 3,
            validate: (computedStyle) => computedStyle.justifyContent === "center"
        },
        {
            title: "第三關",
            description: "現在卡片已經水平置中了，請再加把勁，讓卡片也「垂直置中」吧！",
            hint: "控制「交差軸對齊」的屬性是 align-items。同樣地，請將它的值也設定為關鍵字「center」唷！",
            cardsCount: 3,
            validate: (computedStyle) => computedStyle.alignItems === "center"
        },
        {
            title: "第四關",
            description: "轉個彎吧！請將主軸方向改成「直向排列」，讓卡片轉為垂直由上往下排。",
            hint: "主軸方向由 flex-direction 控制，直向的值是 column。",
            cardsCount: 3,
            validate: (computedStyle) => computedStyle.flexDirection === "column"
        },
        {
            title: "第五關",
            description: "大魔王來了！這裡有 5 張卡片。請設定讓卡片在畫布空間不足時「自動換行」。",
            hint: "控制換行的屬性是 flex-wrap，請讓它允許換行（wrap）。",
            cardsCount: 5,
            validate: (computedStyle) => computedStyle.flexWrap === "wrap"
        }
    ];

    let currentLevelIndex = 0;
    const completedLevels = new Set(); 
    let fireworkTimer = null; 

    function initGame() {
        renderNav();
        loadLevel(currentLevelIndex);
    }

    function renderNav() {
        const nav = document.getElementById("levelNav");
        nav.innerHTML = "";
        levels.forEach((lvl, index) => {
            const btn = document.createElement("button");
            let className = 'level-btn';
            if (index === currentLevelIndex) className += ' active';
            if (completedLevels.has(index)) className += ' completed';
            btn.className = className;
            btn.innerText = lvl.title;
            btn.onclick = () => switchLevel(index);
            nav.appendChild(btn);
        });
    }

    function loadLevel(index) {
        currentLevelIndex = index;
        const level = levels[index];
        renderNav();
        
        document.getElementById("levelTitle").innerText = level.title;
        document.getElementById("targetDescription").innerText = level.description;
        const hintBox = document.getElementById("hintBox");
        hintBox.innerText = level.hint;
        hintBox.style.display = "none";
        
        document.getElementById("cssInput").value = "";
        resetCheckBtn();
        
        const container = document.getElementById("flex-container");
        container.removeAttribute("style");
        container.style.display = "flex"; 
        
        if (level.initStyles) Object.assign(container.style, level.initStyles);

        container.innerHTML = "";
        for (let i = 1; i <= level.cardsCount; i++) {
            const card = document.createElement("div");
            card.className = `card card-${i}`;
            card.innerText = i;
            container.appendChild(card);
        }
    }

    function switchLevel(index) {
        loadLevel(index);
    }

    function toggleHint() {
        const hintBox = document.getElementById("hintBox");
        hintBox.style.display = window.getComputedStyle(hintBox).display === "none" ? "block" : "none";
        resetCheckBtn();
    }

    function resetCheckBtn() {
        const btn = document.getElementById("checkBtn");
        btn.className = "action-btn check-btn";
        document.getElementById("checkIcon").innerText = "✅";
        document.getElementById("checkText").innerText = "檢查答案";
    }

    function checkAnswer() {
        const inputCode = document.getElementById("cssInput").value;
        const container = document.getElementById("flex-container");
        const btn = document.getElementById("checkBtn");
        const icon = document.getElementById("checkIcon");
        const text = document.getElementById("checkText");
        
        try {
            const currentLevel = levels[currentLevelIndex];
            container.style.cssText = "display: flex;";
            if (currentLevel.initStyles) Object.assign(container.style, currentLevel.initStyles);
            
            container.style.cssText += inputCode;
            const computedStyle = window.getComputedStyle(container);
            
            if (currentLevel.validate(computedStyle)) {
                completedLevels.add(currentLevelIndex);
                renderNav();
                
                btn.className = "action-btn check-btn success-glow";
                icon.innerText = "🏆";
                text.innerText = "成功破關！";

                createConfettiEffect();

                setTimeout(() => {
                    if (currentLevelIndex < levels.length - 1) {
                        loadLevel(currentLevelIndex + 1); 
                    } else {
                        triggerCleanEndingView(); 
                    }
                }, 1500); 

            } else {
                btn.className = "action-btn check-btn error";
                icon.innerText = "❌";
                text.innerText = "畫面不對喔";
                setTimeout(resetCheckBtn, 1000);
            }
        } catch (e) {
            btn.className = "action-btn check-btn error";
            icon.innerText = "⚠️";
            text.innerText = "語法錯誤";
            setTimeout(resetCheckBtn, 1000);
        }
    }

    function createConfettiEffect() {
        const panel = document.querySelector('.visual-panel');
        const colors = ['#3b82f6', '#22c55e', '#f59e0b', '#ef4444', '#a855f7'];
        for (let i = 0; i < 25; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = (Math.random() * 80 + 10) + '%'; 
            confetti.style.top = '-10px';
            confetti.style.animationDelay = (Math.random() * 0.4) + 's';
            panel.appendChild(confetti);
            // 【已修正】將原本錯誤的 onfetti 改回正確的 confetti
            confetti.addEventListener('animationend', () => confetti.remove());
        }
    }

    function triggerCleanEndingView() {
        document.getElementById("mainGameContainer").style.display = "none";
        
        const endingDiv = document.createElement("div");
        endingDiv.className = "ending-view";
        endingDiv.id = "cleanEndingView";
        endingDiv.innerHTML = `
            <h2>🏆 恭喜畢業啦！</h2>
            <p>你已經完美掌握了核心 Flexbox 語法！</p>
            <button class="restart-btn" onclick="completelyResetGame()">再玩一次 🔄</button>
        `;
        document.body.appendChild(endingDiv);

        let fireworkCount = 0;
        fireworkTimer = setInterval(() => {
            createIndependentFirework(endingDiv);
            fireworkCount++;
            if(fireworkCount >= 15) clearInterval(fireworkTimer); 
        }, 300);
    }

    function createIndependentFirework(targetContainer) {
        if (!targetContainer) return;
        const colors = ['#f59e0b', '#fbbf24', '#ffffff', '#22c55e', '#3b82f6', '#ec4899'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        
        const centerX = (Math.random() * 70 + 15) + '%';
        const centerY = (Math.random() * 50 + 20) + '%';
        
        for (let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.className = 'ending-firework';
            particle.style.backgroundColor = color;
            particle.style.left = centerX;
            particle.style.top = centerY;
            particle.style.boxShadow = `0 0 12px ${color}`;
            
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 180 + 60;
            particle.style.setProperty('--fx-x', Math.cos(angle) * distance + 'px');
            particle.style.setProperty('--fx-y', Math.sin(angle) * distance + 'px');
            
            particle.style.animationDuration = (Math.random() * 0.8 + 1.0) + 's';
            
            targetContainer.appendChild(particle);
            particle.addEventListener('animationend', () => particle.remove());
        }
    }

    function completelyResetGame() {
        if(fireworkTimer) clearInterval(fireworkTimer);
        const endingView = document.getElementById("cleanEndingView");
        if (endingView) endingView.remove();
        document.getElementById("mainGameContainer").style.display = "block";
        completedLevels.clear();
        loadLevel(0);
    }

    window.onload = initGame;
</script>

</body>
</html>
