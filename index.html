<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox 倉鼠大冒險 V3.0 - 炫彩漸層與無限煙火版！</title>
    <style>
        /* --- 基礎版面與配色 --- */
        :root {
            --primary-color: #3b82f6; 
            --success-color: #22c55e; 
            --warning-color: #f59e0b; 
            --danger-color: #ef4444;
            --bg-color: #f0f4f8;
            --text-color: #1e293b;
            --code-bg: #1e1e1e;
        }

        /* [優化] 從根本杜絕整個網頁與特效產生任何多餘的滾動條 */
        html, body {
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            width: 100%;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            padding: 10px;
            box-sizing: border-box;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* 遊戲主容器 */
        .container {
            width: 100%;
            max-width: 1100px;
            background: #fff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-top: 20px;
            box-sizing: border-box;
        }

        /* [優化] 統一所有大標題為耀眼的彩色漸層文字與發光特效 */
        .gradient-title {
            text-align: center;
            font-size: 3.5em; 
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #fbbf24, #d97706); /* 金橘彩色漸層 */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
            filter: drop-shadow(0 4px 15px rgba(217, 119, 6, 0.35)); 
        }
        
        /* --- 關卡導覽 --- */
        .level-nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
        }
        .level-btn {
            padding: 10px 18px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            transition: all 0.2s ease;
            font-size: 0.95em;
        }
        .level-btn.active {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border-color: #d97706;
            box-shadow: 0 4px 10px rgba(217, 119, 6, 0.3);
        }
        .level-btn.completed {
            border-color: var(--success-color);
            color: var(--success-color);
        }

        /* --- 遊戲主區塊 --- */
        .game-area {
            display: flex;
            gap: 30px;
        }
        @media (max-width: 850px) {
            .game-area { flex-direction: column; }
        }
        
        .control-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 320px;
        }
        .instruction-box {
            background: #fffbeb; 
            padding: 18px;
            border-left: 6px solid #d97706;
            border-radius: 8px;
        }
        .instruction-box h3 { margin: 0 0 10px 0; color: #d97706; font-size: 1.2em;}
        .instruction-box p { margin: 0; line-height: 1.6; font-size: 1.05em;}

        .hint-box {
            background: #fffbeb;
            padding: 15px;
            border-left: 6px solid var(--warning-color);
            border-radius: 8px;
            color: #92400e;
            display: none;
            font-size: 1.1em;
            font-weight: 700; 
            line-height: 1.5;
        }
        
        .code-container {
            background: var(--code-bg);
            color: #d4d4d4;
            padding: 18px;
            border-radius: 10px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 15px;
        }
        .code-prefix { color: #569cd6; }
        textarea {
            width: 100%;
            height: 120px;
            background: #2d2d2d;
            color: #ce9178;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px;
            font-family: inherit;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            margin: 10px 0;
            outline: none;
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }
        button.action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease, transform 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        button.action-btn:active { transform: scale(0.98); }

        .hint-btn { background: #d97706; color: white; }
        .check-btn { background: var(--success-color); color: white; }
        .check-btn.error { background-color: var(--danger-color); animation: shake 0.4s; }
        .check-btn.success-glow { background: linear-gradient(45deg, #f59e0b, #fbbf24); }

        /* 右側畫布預覽區 */
        .visual-panel {
            flex: 1;
            background: #fef6e4; 
            border: 4px dashed #f59e0b;
            border-radius: 12px;
            min-height: 400px;
            display: flex;
            position: relative;
        }
        #flex-container { width: 100%; height: 100%; box-sizing: border-box; padding: 15px; display: flex; }

        /* --- 🐹 活體動態倉鼠樣式 --- */
        .card {
            width: 95px; 
            height: 95px; 
            margin: 8px; 
            color: white; 
            font-weight: 800; 
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            border-radius: 50%; 
            position: relative;
            box-shadow: 0 6px 12px rgba(217,119,6,0.2);
            border: 3px solid #fff;
            animation: hamsterFloat 3s ease-in-out infinite;
        }

        .card-1 { background: linear-gradient(135deg, #ff8787, #e03131); animation-delay: 0s; }
        .card-2 { background: linear-gradient(135deg, #74c0fc, #1971c2); animation-delay: 0.3s; }
        .card-3 { background: linear-gradient(135deg, #da77f2, #9c36b5); animation-delay: 0.6s; }
        .card-4 { background: linear-gradient(135deg, #ffd43b, #f59f00); animation-delay: 0.9s; }
        .card-5 { background: linear-gradient(135deg, #63e6be, #0ca678); animation-delay: 1.2s; }

        @keyframes hamsterFloat {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.03); } 
            100% { transform: translateY(0) scale(1); }
        }

        .card .avatar {
            font-size: 36px;
            margin-bottom: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1; /* 徹底修正 emoji 造成的排版擠壓 */
            animation: hamsterSquish 1.5s ease-in-out infinite alternate;
        }
        @keyframes hamsterSquish {
            0% { transform: scaleX(1); }
            100% { transform: scaleX(0.95); }
        }

        .card .number {
            font-size: 13px;
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* --- 錯誤按鈕抖動 --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* --- 單關彩色小紙花 --- */
        .confetti {
            position: absolute; width: 10px; height: 10px; border-radius: 50%;
            animation: confettiFall 1.5s ease-out forwards; opacity: 0; z-index: 10;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(150px) scale(0.5); opacity: 0; }
        }

        /* --- ✨ 🚀 絕對無捲軸歡迎畫面樣式 --- */
        .welcome-view {
            width: 100vw;
            height: 100vh;
            background-color: #0b0f19; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0; left: 0;
            z-index: 10000; 
            overflow: hidden; /* 杜絕最右邊拉條 Bar */
            transition: opacity 0.6s ease, visibility 0.6s ease;
            opacity: 1;
            visibility: visible;
        }
        .welcome-view.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .welcome-view p {
            color: #94a3b8;
            font-size: 1.3em;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        .welcome-hamsters {
            display: flex;
            gap: 15px;
            margin-bottom: 50px;
        }
        .welcome-hamsters .ham-preview {
            width: 75px; height: 75px;
            border-radius: 50%;
            font-size: 34px;
            display: flex; justify-content: center; align-items: center;
            border: 3px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            line-height: 1;
            animation: hamsterFloat 2.5s ease-in-out infinite;
        }
        .start-adventure-btn {
            padding: 18px 45px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(245, 158, 11, 0.5);
            transition: all 0.2s ease;
            animation: pulseGlow 2s infinite;
        }
        .start-adventure-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 35px rgba(245, 158, 11, 0.8);
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }
            50% { box-shadow: 0 0 35px rgba(245, 158, 11, 0.7); }
            100% { box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }
        }

        /* --- 🎉 絕對無捲軸畢業通關畫面樣式 --- */
        .ending-view {
            width: 100vw;
            height: 100vh;
            background-color: #0b0f19; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fbbf24;
            text-align: center;
            position: fixed; 
            top: 0; left: 0;
            z-index: 9999;
            overflow: hidden; /* 杜絕最右邊拉條 Bar */
        }
        .ending-view h2 { font-size: 3.8em; margin: 0; text-shadow: 0 0 25px rgba(245,158,11,0.7); animation: bounceIn 1s ease; }
        .ending-view p { font-size: 1.6em; color: #ffffff; margin: 20px 0 40px 0; opacity: 0.9; }
        .restart-btn {
            padding: 16px 36px; background: var(--success-color); color: white;
            border: none; border-radius: 30px; font-size: 20px; font-weight: bold;
            cursor: pointer; box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
            transition: all 0.2s;
            z-index: 10001; /* 確保按鈕永遠在煙火最上層可供點擊 */
        }
        .restart-btn:hover { background-color: #16a34a; transform: translateY(-2px); }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .ending-firework {
            position: absolute; width: 6px; height: 6px; border-radius: 50%;
            animation: fireworkSpread 1.8s ease-out forwards;
        }
        @keyframes fireworkSpread {
            0% { transform: translate(0, 0); opacity: 1; }
            100% { transform: translate(var(--fx-x), var(--fx-y)); opacity: 0; }
        }
    </style>
</head>
<body>

<!-- 🚀 炫麗開場歡迎畫面 -->
<div class="welcome-view" id="welcomeStage">
    <!-- [優化] 彩色漸層標題 -->
    <span class="gradient-title">🐹 Flexbox 倉鼠大冒險！</span>
    <p>—— 用排版魔法，幫萌寵找到完美的家 ——</p>
    
    <!-- [優化] 徹底修正倉鼠臉部表情，確保清晰不被遮擋 -->
    <div class="welcome-hamsters">
        <div class="ham-preview" style="background: linear-gradient(135deg, #ff8787, #e03131); animation-delay: 0.0s;">🐹</div>
        <div class="ham-preview" style="background: linear-gradient(135deg, #74c0fc, #1971c2); animation-delay: 0.2s;">🐹</div>
        <div class="ham-preview" style="background: linear-gradient(135deg, #da77f2, #9c36b5); animation-delay: 0.4s;">🐹</div>
        <div class="ham-preview" style="background: linear-gradient(135deg, #ffd43b, #f59f00); animation-delay: 0.6s;">🐹</div>
        <div class="ham-preview" style="background: linear-gradient(135deg, #63e6be, #0ca678); animation-delay: 0.8s;">🐹</div>
    </div>

    <button class="start-adventure-btn" onclick="startAdventure()">開始冒險 🚀</button>
</div>

<!-- 遊戲主場景 -->
<div class="container" id="mainGameContainer">
    <!-- [優化] 內部標題完美同步漸層色 -->
    <span class="gradient-title">🐹 Flexbox 倉鼠大冒險！</span>
    <div class="level-nav" id="levelNav"></div>

    <div class="game-area">
        <div class="control-panel">
            <div class="instruction-box">
                <h3><span id="levelTitle"></span>: 任務目標</h3>
                <p id="targetDescription">載入中...</p>
            </div>
            
            <div class="hint-box" id="hintBox"></div>

            <div class="code-container">
                <span class="code-prefix">#hamster-cage {</span>
                <textarea id="cssInput" placeholder="/* 在這裡輸入你的 Flexbox 屬性 */&#10;例如：justify-content: center;"></textarea>
                <span class="code-prefix">}</span>
            </div>

            <div class="btn-group">
                <button class="action-btn hint-btn" onclick="toggleHint()"><span>💡</span> 快速提示</button>
                <button class="action-btn check-btn" id="checkBtn" onclick="checkAnswer()">
                    <span id="checkIcon">✅</span> <span id="checkText">檢查答案</span>
                </button>
            </div>
        </div>

        <div class="visual-panel">
            <div id="flex-container"></div>
        </div>
    </div>
</div>

<script>
    // [優化] 倉鼠頭像重新整理，去除干擾文字，確保臉部清晰可見
    const hamsters = [
        { avatar: "🐹" },
        { avatar: "🐹" },
        { avatar: "🐹" },
        { avatar: "🐹" },
        { avatar: "🐹" }
    ];

    // [優化] 快速提示文字完全遵照「功能 → 語法」格式
    const levels = [
        {
            title: "第一關",
            description: "小倉鼠們預設是上下疊在一起的。請使用屬性讓這三隻倉鼠舒服地「橫向排成一列」吧！",
            hint: "設定主軸「橫向排列」→ flex-direction: row;",
            cardsCount: 3,
            initStyles: { flexDirection: "column" }, 
            validate: (computedStyle) => computedStyle.flexDirection === "row"
        },
        {
            title: "第二關",
            description: "太棒了！接下來請讓這三張橫排的倉鼠，在籠子裡「水平置中」對齊集合。",
            hint: "設定主軸「水平置中」→ justify-content: center;",
            cardsCount: 3,
            validate: (computedStyle) => computedStyle.justifyContent === "center"
        },
        {
            title: "第三關",
            description: "現在倉鼠已經水平置中了，請再加把勁，讓牠們在上下高度也「垂直置中」吧！",
            hint: "設定交錯軸「垂直置中」→ align-items: center;",
            cardsCount: 3,
            validate: (computedStyle) => computedStyle.alignItems === "center"
        },
        {
            title: "第四關",
            description: "換個隊形！請將主軸方向改成「直向排列」，讓倉鼠們轉為垂直由上往下排成一縱隊。",
            hint: "設定主軸「直向排列」→ flex-direction: column;",
            cardsCount: 3,
            validate: (computedStyle) => computedStyle.flexDirection === "column"
        },
        {
            title: "第五關",
            description: "大魔王來了！這次來了 5 隻大倉鼠，籠子塞不下啦。請設定屬性讓空間不足時牠們能「自動換行」到下一排。",
            hint: "設定「自動換行」→ flex-wrap: wrap;",
            cardsCount: 5,
            validate: (computedStyle) => computedStyle.flexWrap === "wrap"
        }
    ];

    let currentLevelIndex = 0;
    const completedLevels = new Set(); 
    let fireworkTimer = null; 

    function initGame() {
        renderNav();
        loadLevel(currentLevelIndex);
    }

    function startAdventure() {
        const stage = document.getElementById("welcomeStage");
        stage.classList.add("fade-out"); 
    }

    function renderNav() {
        const nav = document.getElementById("levelNav");
        nav.innerHTML = "";
        levels.forEach((lvl, index) => {
            const btn = document.createElement("button");
            let className = 'level-btn';
            if (index === currentLevelIndex) className += ' active';
            if (completedLevels.has(index)) className += ' completed';
            btn.className = className;
            btn.innerText = lvl.title;
            btn.onclick = () => switchLevel(index);
            nav.appendChild(btn);
        });
    }

    function loadLevel(index) {
        currentLevelIndex = index;
        const level = levels[index];
        renderNav();
        
        document.getElementById("levelTitle").innerText = level.title;
        document.getElementById("targetDescription").innerText = level.description;
        const hintBox = document.getElementById("hintBox");
        hintBox.innerText = level.hint;
        hintBox.style.display = "none";
        
        document.getElementById("cssInput").value = "";
        resetCheckBtn();
        
        const container = document.getElementById("flex-container");
        container.removeAttribute("style");
        container.style.display = "flex"; 
        
        if (level.initStyles) Object.assign(container.style, level.initStyles);

        container.innerHTML = "";
        for (let i = 0; i < level.cardsCount; i++) {
            const card = document.createElement("div");
            card.className = `card card-${i+1}`;
            card.innerHTML = `
                <div class="avatar">${hamsters[i].avatar}</div>
                <div class="number">No.${i+1}</div>
            `;
            container.appendChild(card);
        }
    }

    function switchLevel(index) {
        loadLevel(index);
    }

    function toggleHint() {
        const hintBox = document.getElementById("hintBox");
        hintBox.style.display = window.getComputedStyle(hintBox).display === "none" ? "block" : "none";
        resetCheckBtn();
    }

    function resetCheckBtn() {
        const btn = document.getElementById("checkBtn");
        btn.className = "action-btn check-btn";
        document.getElementById("checkIcon").innerText = "✅";
        document.getElementById("checkText").innerText = "檢查答案";
    }

    function checkAnswer() {
        const inputCode = document.getElementById("cssInput").value;
        const container = document.getElementById("flex-container");
        const btn = document.getElementById("checkBtn");
        const icon = document.getElementById("checkIcon");
        const text = document.getElementById("checkText");
        
        try {
            const currentLevel = levels[currentLevelIndex];
            container.style.cssText = "display: flex;";
            if (currentLevel.initStyles) Object.assign(container.style, currentLevel.initStyles);
            
            container.style.cssText += inputCode;
            const computedStyle = window.getComputedStyle(container);
            
            if (currentLevel.validate(computedStyle)) {
                completedLevels.add(currentLevelIndex);
                renderNav();
                
                btn.className = "action-btn check-btn success-glow";
                icon.innerText = "🐹";
                text.innerText = "倉鼠排好隊了！";

                createConfettiEffect();

                setTimeout(() => {
                    if (currentLevelIndex < levels.length - 1) {
                        loadLevel(currentLevelIndex + 1); 
                    } else {
                        triggerCleanEndingView(); 
                    }
                }, 1500); 

            } else {
                btn.className = "action-btn check-btn error";
                icon.innerText = "❌";
                text.innerText = "倉鼠撞成一團";
                setTimeout(resetCheckBtn, 1000);
            }
        } catch (e) {
            btn.className = "action-btn check-btn error";
            icon.innerText = "⚠️";
            text.innerText = "語法錯誤";
            setTimeout(resetCheckBtn, 1000);
        }
    }

    function createConfettiEffect() {
        const panel = document.querySelector('.visual-panel');
        const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ec4899', '#8b5cf6'];
        for (let i = 0; i < 25; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = (Math.random() * 80 + 10) + '%'; 
            confetti.style.top = '-10px';
            confetti.style.animationDelay = (Math.random() * 0.4) + 's';
            panel.appendChild(confetti);
            confetti.addEventListener('animationend', () => confetti.remove());
        }
    }

    // 🎉 獨立滿版「恭喜畢業啦！」畫面
    function triggerCleanEndingView() {
        document.getElementById("mainGameContainer").style.display = "none";
        
        const endingDiv = document.createElement("div");
        endingDiv.className = "ending-view";
        endingDiv.id = "cleanEndingView";
        endingDiv.innerHTML = `
            <h2>🏆 恭喜畢業啦！</h2>
            <p>你已經完美掌握了核心 Flexbox 語法！</p>
            <button class="restart-btn" onclick="completelyResetGame()">再跟倉鼠玩一次 🔄</button>
        `;
        document.body.appendChild(endingDiv);

        // [修改] 將計數器拿掉，讓 setInterval 無限循環放煙火，永不停止！
        fireworkTimer = setInterval(() => {
            createIndependentFirework(endingDiv);
        }, 300);
    }

    function createIndependentFirework(targetContainer) {
        if (!targetContainer) return;
        const colors = ['#f59e0b', '#fbbf24', '#ffffff', '#10b981', '#3b82f6', '#ec4899'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        
        const centerX = (Math.random() * 70 + 15) + '%';
        const centerY = (Math.random() * 50 + 20) + '%';
        
        for (let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.className = 'ending-firework';
            particle.style.backgroundColor = color;
            particle.style.left = centerX;
            particle.style.top = centerY;
            particle.style.boxShadow = `0 0 12px ${color}`;
            
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * 180 + 60;
            particle.style.setProperty('--fx-x', Math.cos(angle) * distance + 'px');
            particle.style.setProperty('--fx-y', Math.sin(angle) * distance + 'px');
            
            particle.style.animationDuration = (Math.random() * 0.8 + 1.0) + 's';
            
            targetContainer.appendChild(particle);
            particle.addEventListener('animationend', () => particle.remove());
        }
    }

    function completelyResetGame() {
        if(fireworkTimer) clearInterval(fireworkTimer); // 點擊按鈕時，才正式停止煙火
        
        const endingView = document.getElementById("cleanEndingView");
        if (endingView) endingView.remove();
        
        const welcomeStage = document.getElementById("welcomeStage");
        if (welcomeStage) {
            welcomeStage.classList.remove("fade-out");
        } else {
            window.location.reload();
            return;
        }
        
        document.getElementById("mainGameContainer").style.display = "block";
        completedLevels.clear();
        loadLevel(0);
    }

    window.onload = initGame;
</script>

</body>
</html>
