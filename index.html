<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox 5關大闖關遊戲！</title>
    <style>
        /* --- 基礎版面樣式 --- */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #4a90e2;
        }
        
        /* --- 關卡切換導覽列 --- */
        .level-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .level-btn {
            padding: 10px 15px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .level-btn.active {
            background: #4a90e2;
            color: white;
            border-color: #4a90e2;
        }
        .level-btn.completed {
            border-color: #2ecc71;
            color: #2ecc71;
        }

        /* --- 遊戲主區塊：左邊控制、右邊預覽 --- */
        .game-area {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .game-area { flex-direction: column; }
        }
        
        /* 左側控制面板 */
        .control-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .instruction-box {
            background: #eef5fc;
            padding: 15px;
            border-left: 5px solid #4a90e2;
            border-radius: 4px;
        }
        .hint-box {
            background: #fff3cd;
            padding: 10px 15px;
            border-left: 5px solid #ffc107;
            border-radius: 4px;
            font-size: 0.9em;
            display: none; /* 預設隱藏提示 */
        }
        
        /* CSS 輸入區域樣式 */
        .code-container {
            background: #2d3748;
            color: #fff;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
        }
        .code-prefix { color: #f6ad55; }
        textarea {
            width: 100%;
            height: 100px;
            background: #1a202c;
            color: #a0aec0;
            border: 1px solid #4a5568;
            border-radius: 4px;
            padding: 10px;
            font-family: inherit;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            margin-top: 5px;
        }
        textarea:focus {
            outline: none;
            border-color: #4a90e2;
            color: #fff;
        }

        /* 按鈕群組 */
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button.action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .check-btn { background: #2ecc71; color: white; }
        .hint-btn { background: #ffc107; color: #333; }

        /* 右側畫布預覽區 */
        .visual-panel {
            flex: 1;
            background: #edf2f7;
            border: 3px dashed #cbd5e0;
            border-radius: 8px;
            min-height: 350px;
            position: relative;
        }
        
        /* Flexbox 容器（這是學生要用 CSS 控制的主角） */
        #flex-container {
            width: 100%;
            height: 100%;
            min-height: 350px;
            box-sizing: border-box;
            padding: 10px;
            /* 注意：預設就是 flex，讓學生專注在 flex 屬性發揮 */
            display: flex; 
        }

        /* 卡片基本樣式 */
        .card {
            width: 80px;
            height: 80px;
            margin: 5px;
            color: white;
            font-weight: bold;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card-1 { background: #e74c3c; }
        .card-2 { background: #3498db; }
        .card-3 { background: #9b59b6; }
        .card-4 { background: #e67e22; }
        .card-5 { background: #1abc9c; }
    </style>
</head>
<body>

<div class="container">
    <h1>Flexbox 5關大闖關</h1>
    
    <!-- 關卡導覽按鈕 -->
    <div class="level-nav" id="levelNav"></div>

    <div class="game-area">
        <!-- 左側控制面板 -->
        <div class="control-panel">
            <div class="instruction-box">
                <h3>任務目標</h3>
                <p id="targetDescription">載入中...</p>
            </div>
            
            <div class="hint-box" id="hintBox"></div>

            <div class="code-container">
                <span class="code-prefix">#flex-container {</span>
                <textarea id="cssInput" placeholder="/* 在這裡輸入你的 Flexbox 屬性 */&#10;例如：justify-content: center;"></textarea>
                <span class="code-prefix">}</span>
            </div>

            <div class="btn-group">
                <button class="action-btn hint-btn" onclick="toggleHint()">檢視提示</button>
                <button class="action-btn check-btn" onclick="checkAnswer()">檢查答案</button>
            </div>
        </div>

        <!-- 右側視覺預覽面板 -->
        <div class="visual-panel">
            <div id="flex-container">
                <!-- 卡片會由 JavaScript 根據關卡動態產生 -->
            </div>
        </div>
    </div>
</div>

<script>
    // --- 關卡資料庫定義 ---
    const levels = [
        {
            id: 1,
            title: "第一關",
            description: "預設的區塊元素是上下排列的。請使用屬性讓這三張卡片「橫向一排」吧！",
            hint: "試試看設定主軸方向的屬性：flex-direction: row;",
            cardsCount: 3,
            // 驗證過關的條件：檢查容器的最終 CSS 樣式
            validate: (computedStyle) => computedStyle.flexDirection === "row"
        },
        {
            id: 2,
            title: "第二關",
            description: "太棒了！接下來請讓這三張橫排的卡片，在畫布中「水平置中」對齊。",
            hint: "控制「主軸（目前是水平軸）對齊」的屬性是 justify-content。想想看置中要填什麼值？",
            cardsCount: 3,
            validate: (computedStyle) => computedStyle.justifyContent === "center"
        },
        {
            id: 3,
            title: "第三關",
            description: "現在卡片已經水平置中了，請再加把勁，讓卡片也「垂直置中」吧！",
            hint: "控制「交差軸（目前是垂直軸）對齊」的屬性是 align-items。",
            cardsCount: 3,
            validate: (computedStyle) => computedStyle.alignItems === "center"
        },
        {
            id: 4,
            title: "第四關",
            description: "轉個彎吧！請將主軸方向改成「直向排列」，讓卡片轉為垂直由上往下排。",
            hint: "主軸方向由 flex-direction 控制，直向的值是 column。",
            cardsCount: 3,
            validate: (computedStyle) => computedStyle.flexDirection === "column"
        },
        {
            id: 5,
            title: "第五關",
            description: "大魔王來了！這裡有 5 張卡片，寬度已經超出容器了。請設定讓卡片在空間不足時「自動換行」。",
            hint: "控制換行的屬性是 flex-wrap，請讓它允許換行（wrap）。",
            cardsCount: 5,
            validate: (computedStyle) => computedStyle.flexWrap === "wrap"
        }
    ];

    let currentLevelIndex = 0;

    // --- 初始化遊戲 ---
    function initGame() {
        renderNav();
        loadLevel(currentLevelIndex);
    }

    // 渲染關卡導覽列
    function renderNav() {
        const nav = document.getElementById("levelNav");
        nav.innerHTML = "";
        levels.forEach((lvl, index) => {
            const btn = document.createElement("button");
            btn.className = `level-btn ${index === currentLevelIndex ? 'active' : ''}`;
            btn.innerText = lvl.title;
            btn.onclick = () => switchLevel(index);
            nav.appendChild(btn);
        });
    }

    // 載入指定關卡
    function loadLevel(index) {
        currentLevelIndex = index;
        const level = levels[index];
        
        // 更新導覽列狀態
        renderNav();
        
        // 更新目標描述與隱藏提示
        document.getElementById("targetDescription").innerText = level.description;
        const hintBox = document.getElementById("hintBox");
        hintBox.innerText = level.hint;
        hintBox.style.display = "none";
        
        // 清空輸入框與重設畫布
        document.getElementById("cssInput").value = "";
        
        const container = document.getElementById("flex-container");
        container.removeAttribute("style"); // 移除上一次留下的 inline style
        container.style.display = "flex";  // 確保維持 flex 佈局
        
        // 根據關卡設定，第一關故意先切換成直向，讓學生體驗橫排的威力
        if(level.id === 1) {
            container.style.flexDirection = "column";
        }

        // 動態產生卡片
        container.innerHTML = "";
        for (let i = 1; i <= level.cardsCount; i++) {
            const card = document.createElement("div");
            card.className = `card card-${i}`;
            card.innerText = i;
            container.appendChild(card);
        }
    }

    // 切換關卡
    function switchLevel(index) {
        loadLevel(index);
    }

    // 切換提示顯示狀態
    function toggleHint() {
        const hintBox = document.getElementById("hintBox");
        hintBox.style.display = hintBox.style.display === "none" ? "block" : "none";
    }

    // 檢查答案是否正確
    function checkAnswer() {
        const inputCode = document.getElementById("cssInput").value;
        const container = document.getElementById("flex-container");
        
        try {
            // 將學生輸入的文字，動態寫入容器的 style 屬性中
            container.style.cssText = "display: flex; " + inputCode;
            
            // 取得瀏覽器實際解析後的 CSS 樣式
            const computedStyle = window.getComputedStyle(container);
            const currentLevel = levels[currentLevelIndex];
            
            // 呼叫關卡的驗證函式
            if (currentLevel.validate(computedStyle)) {
                alert("恭喜！順利過關 🎉");
                
                // 標記該關卡按鈕為完成（可選擴充）
                if (currentLevelIndex < levels.length - 1) {
                    loadLevel(currentLevelIndex + 1); // 自動跳下一關
                } else {
                    alert("太強了！你已經全數通關！畢業啦 🎓");
                }
            } else {
                alert("格式可能正確，但畫面還沒達到目標唷，再調整看看！提示能幫到你。");
            }
        } catch (e) {
            alert("代碼語法好像有點小錯誤，請檢查是否漏了分號 ; 唷！");
        }
    }

    // 當網頁載入完成，立刻啟動遊戲
    window.onload = initGame;
</script>

</body>
</html>
